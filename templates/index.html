<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>지하철 분실물 조회 서비스</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <link rel="stylesheet" href="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.css">
    <script src="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div id="map-area">
        <object id="subway-svg" data="/static/map/Seoul_subway_linemap_ko.svg" type="image/svg+xml"></object>
        <div class="api-credit">
            본 서비스는 경찰청에서 제공하는 
            '포털기관 습득물정보 조회 서비스 API'를 활용하여 제작되었습니다.
        </div>
    </div>

    <aside id="side-panel">
        <div class="panel-header">
            <h1 id="st-title">습득물 조회</h1>
            <div class="search-box">
                <input type="text" id="search" placeholder="역 / 분실물 입력...">
                <button type="button" id="search-btn">검색</button>
            </div>
        </div>
        <div id="list">
            <p class="status-msg">지도의 역 이름을 클릭해 주세요.</p>
        </div>
        <div id="pagination" class="tui-pagination"></div>
    </aside>
    <!-- 상세 정보 모달 -->
    <div id="modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">상세 정보</h3>
                <button id="modal-close" aria-label="닫기">X</button>
            </div>
            <div id="modal-body">
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
